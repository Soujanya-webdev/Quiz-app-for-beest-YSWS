<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrainBuzz Quiz</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HOME SCREEN -->
  <section class="screen active" id="homeScreen">
    <div class="card">
      <h1>BrainBuzz Quiz</h1>
      <p class="subtitle">Create your own quiz or play instant generated quizzes.</p>

      <div class="home-buttons">
        <button id="customQuizBtn">Create Custom Quiz</button>
        <button class="secondary" id="generatedQuizBtn">Play Generated Quiz</button>
      </div>
    </div>
  </section>

  <!-- CUSTOM QUIZ BUILDER -->
  <section class="screen" id="builderScreen">
    <div class="card">
      <div class="top">
        <h2>Create Quiz</h2>
        <button class="small-btn" onclick="goHome()">Home</button>
      </div>

      <input type="text" id="questionInput" placeholder="Enter question">

      <div class="grid">
        <input type="text" id="option1" placeholder="Option 1">
        <input type="text" id="option2" placeholder="Option 2">
        <input type="text" id="option3" placeholder="Option 3">
        <input type="text" id="option4" placeholder="Option 4">
      </div>

      <input type="number" id="correctOption" placeholder="Correct option (1-4)" min="1" max="4">

      <div class="builder-buttons">
        <button onclick="addQuestion()">Add Question</button>
        <button class="secondary" onclick="startCustomQuiz()">Start Quiz</button>
      </div>

      <div id="questionList"></div>
    </div>
  </section>

  <!-- GENERATED QUIZ SETTINGS -->
  <section class="screen" id="generatedScreen">
    <div class="card">
      <div class="top">
        <h2>Generated Quiz</h2>
        <button class="small-btn" onclick="goHome()">Home</button>
      </div>

      <label>Choose Subject</label>
      <select id="subjectSelect">
        <option value="science">Science</option>
        <option value="math">Math</option>
        <option value="history">History</option>
        <option value="english">English</option>
      </select>

      <label>Choose Difficulty</label>
      <select id="difficultySelect">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>

      <label>Choose Class</label>
      <select id="classSelect">
        <option value="6">Class 6</option>
        <option value="7">Class 7</option>
        <option value="8">Class 8</option>
        <option value="9">Class 9</option>
      </select>

      <button style="margin-top:20px;" onclick="loadGeneratedQuiz()">
        Start Generated Quiz
      </button>
    </div>
  </section>

  <!-- QUIZ SCREEN -->
  <section class="screen" id="quizScreen">
    <div class="quiz-card">

      <div class="quiz-top">
        <span id="progressText">Question 1/5</span>
        <span id="scoreText">Score: 0</span>
      </div>

      <div class="question-box">
        <h2 id="questionText"></h2>
      </div>

      <div id="optionsContainer"></div>

    </div>
  </section>

  <!-- RESULT SCREEN -->
  <section class="screen" id="resultScreen">
    <div class="card result-card">
      <h1>Quiz Finished</h1>

      <h2 id="finalScore"></h2>

      <button onclick="restartQuiz()">Play Again</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
